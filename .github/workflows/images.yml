# Container images for the Avion runtime processes (MUS-269).
#
# Push to master  → build all three images and push to GHCR
#                   (tags: latest + sha-<commit>).
# Pull request    → build-only smoke test (no push), and only when the PR
#                   actually touches the container build inputs.
#
# Deployment stays MANUAL for now: this workflow only publishes images; nothing
# here rolls them out. See docs/DEPLOYMENT.md for the promotion flow.
#
# NOTE: the web image built here has EMPTY NEXT_PUBLIC_* build args (they are
# inlined at build time), so it is suitable for infrastructure smoke tests but
# a real deployment must rebuild with the target environment's values — see
# apps/web/Dockerfile.

name: Images

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - "apps/api/Dockerfile"
      - "apps/web/Dockerfile"
      - "apps/web/Dockerfile.worker"
      - ".dockerignore"
      - "docker-compose.prod.yml"
      - ".github/workflows/images.yml"

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: avion-web
            dockerfile: apps/web/Dockerfile
          - image: avion-api
            dockerfile: apps/api/Dockerfile
          - image: avion-worker
            dockerfile: apps/web/Dockerfile.worker
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the repository owner for GHCR.
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build (and push on master)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
