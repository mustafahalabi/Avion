# Local PostgreSQL for development and integration tests.
#
#   docker compose up -d db
#
# Matches the DATABASE_URL / TEST_DATABASE_URL defaults in .env.example:
#   postgresql://postgres:postgres@localhost:5433/avion
#
# Port 5433 (not 5432) avoids clashing with a system Postgres on the host.
services:
  db:
    image: postgres:16
    container_name: avion-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: avion
    ports:
      - "5433:5432"
    volumes:
      - avion-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d avion"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  avion-pg-data:
